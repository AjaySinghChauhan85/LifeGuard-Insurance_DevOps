apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lifeguard-ingress
  namespace: lifeguard
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT:certificate/YOUR-CERT-ARN
spec:
  rules:
    - host: lifeguard.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lifeguard-app
                port:
                  number: 80
