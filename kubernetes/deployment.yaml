apiVersion: v1
kind: Namespace
metadata:
  name: lifeguard
  labels:
    app: lifeguard-insurance
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifeguard-app
  namespace: lifeguard
  labels:
    app: lifeguard-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lifeguard-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lifeguard-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: lifeguard-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: lifeguard-app
  namespace: lifeguard
spec:
  type: NodePort # Changed from ClusterIP
  selector:
    app: lifeguard-app
  ports:
    - port: 80         # Internal cluster service port
      targetPort: 8080 # The port your Spring Boot container listens on
      nodePort: 31000  # The external port opened on all AWS EC2 worker nodes
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lifeguard-hpa
  namespace: lifeguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lifeguard-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70





















