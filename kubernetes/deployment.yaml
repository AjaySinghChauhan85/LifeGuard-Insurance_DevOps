apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifeguard-app
  namespace: lifeguard
  labels:
    app: lifeguard-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lifeguard-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lifeguard-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: lifeguard-app
          image: IMAGE_PLACEHOLDER # Dynamically updated by Jenkins sed string matching
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          # 1. Startup Probe: Holds off Kubernetes while Java 21 JVM warms up
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 12   # Try 12 times
            periodSeconds: 10      # Every 10 seconds (gives up to 120 seconds total to boot)
          # 2. Readiness Probe: Active only after the application passes startup
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 2
          # 3. Liveness Probe: Keeps checking if the container needs a reboot
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 20
            failureThreshold: 3
