apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifeguard-app
  namespace: lifeguard
  labels:
    app: lifeguard-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lifeguard-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lifeguard-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: lifeguard-app
          image: IMAGE_PLACEHOLDER    # replaced by Jenkinsfile
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lifeguard-db-secret
                  key: host
            - name: DB_NAME
              value: lifeguarddb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: lifeguard-db-secret
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: lifeguard-db-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
