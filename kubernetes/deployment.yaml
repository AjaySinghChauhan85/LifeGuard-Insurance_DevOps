apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifeguard-app
  namespace: lifeguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lifeguard-app
  template:
    metadata:
      labels:
        app: lifeguard-app
    spec:
      containers:
      - name: lifeguard-app
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
      imagePullSecrets:
      - name: dockerhub-secret
---
apiVersion: v1
kind: Service
metadata:
  name: lifeguard-service
  namespace: lifeguard
spec:
  type: LoadBalancer
  selector:
    app: lifeguard-app
  ports:
  - port: 80
    targetPort: 8080
