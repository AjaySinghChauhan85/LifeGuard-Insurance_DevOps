apiVersion: v1
kind: Namespace
metadata:
  name: lifeguard
  labels:
    app: lifeguard-insurance
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifeguard-app
  namespace: lifeguard
  labels:
    app: lifeguard-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lifeguard-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lifeguard-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: lifeguard-app
          image: IMAGE_PLACEHOLDER    # Replaced dynamically by your Jenkinsfile
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lifeguard-db-secret
                  key: host
            - name: DB_NAME
              value: lifeguarddb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: lifeguard-db-secret
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: lifeguard-db-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: lifeguard-app
  namespace: lifeguard
spec:
  selector:
    app: lifeguard-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lifeguard-hpa
  namespace: lifeguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lifeguard-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lifeguard-ingress
  namespace: lifeguard
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT:certificate/YOUR-CERT-ARN
spec:
  rules:
    - host: lifeguard.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lifeguard-app
                port:
                  number: 80





















