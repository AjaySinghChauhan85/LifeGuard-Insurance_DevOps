input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
  }
  date {
    match => ["timestamp", "ISO8601"]
  }
  mutate {
    add_field => { "app" => "lifeguard-insurance" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "lifeguard-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
