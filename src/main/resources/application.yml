spring:
  application:
    name: lifeguard-insurance

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:lifeguarddb}
    username: ${DB_USER:lifeguard}
    password: ${DB_PASS:lifeguard123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Java 21 Virtual Threads (Project Loom) ────────────────────────────────
  # Tells Spring Boot 3.2+ to run Tomcat on virtual threads automatically.
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  tomcat:
    threads:
      max: 200    # With virtual threads this is effectively unlimited — kept as fallback

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # enables /actuator/health/readiness and /actuator/health/liveness
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.lifeguard: INFO
    org.springframework.security: WARN
